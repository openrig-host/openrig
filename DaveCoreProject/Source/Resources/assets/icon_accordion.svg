<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bellows -->
  <g transform="skewX(-10)">
      <rect x="30" y="20" width="40" height="60" fill="#CCC" />
      <line x1="30" y1="30" x2="70" y2="30" stroke="#999" stroke-width="2"/>
      <line x1="30" y1="40" x2="70" y2="40" stroke="#999" stroke-width="2"/>
      <line x1="30" y1="50" x2="70" y2="50" stroke="#999" stroke-width="2"/>
      <line x1="30" y1="60" x2="70" y2="60" stroke="#999" stroke-width="2"/>
      <line x1="30" y1="70" x2="70" y2="70" stroke="#999" stroke-width="2"/>
  </g>
  <!-- Keys Side -->
  <rect x="65" y="15" width="25" height="70" rx="3" fill="#333" />
  <rect x="70" y="20" width="15" height="60" fill="white" />
  <g fill="black">
    <rect x="70" y="25" width="8" height="4" />
    <rect x="70" y="35" width="8" height="4" />
    <rect x="70" y="45" width="8" height="4" />
    <rect x="70" y="55" width="8" height="4" />
  </g>
  <!-- Buttons Side -->
  <rect x="10" y="20" width="20" height="60" rx="3" fill="#333" />
  <circle cx="20" cy="30" r="3" fill="#DDD"/>
  <circle cx="20" cy="40" r="3" fill="#DDD"/>
  <circle cx="20" cy="50" r="3" fill="#DDD"/>
  <circle cx="20" cy="60" r="3" fill="#DDD"/>
  <circle cx="20" cy="70" r="3" fill="#DDD"/>
</svg>
